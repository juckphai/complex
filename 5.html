<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลรางวัลกลุ่มลาวและรัฐบาล</title>
    
    <link rel="manifest" href="manifest-all-lao.json">
    <meta name="theme-color" content="#FF9800"/>
    <link rel="apple-touch-icon" href="192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ผลรางวัลกลุ่มลาว">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style5.css">
</head>
<body>
    <h1>ผลรางวัลกลุ่มลาวและรัฐบาล</h1>

    <div class="form-container">
        <div class="main-orange-box">
            
            <div class="form-group">
                <label for="topicSelect">1. เลือกชนิดผลรางวัล</label>
                <select id="topicSelect">
                    </select>
            </div>

            <div id="laoLotteryFormContent" class="lao-form-style">
                <div class="form-group">
                    <label for="dateInput">2. เลือกวันที่</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group">
                    <label for="numberInput">3. กรอกตัวเลข</label>
                    <input type="text" id="numberInput" placeholder="กรุณาเลือกชนิดผลรางวัลก่อน" pattern="\d*" inputmode="numeric" />
                </div>
                <div class="form-footer">
                    <button id="convertButton" class="convert-button">แจงรายละเอียด</button>
                </div>
            </div>

            <div id="thaiLotteryFormContent" class="thai-lottery-form">
                <div class="thai-grid-container">
                    <div class="thai-grid-full">
                        <label for="draw-date">งวดวันที่ (วว/ดด/ปปปป)</label>
                        <div class="thai-date-wrapper">
                            <input type="text" id="draw-date" placeholder="วว/ดด/ปปปป (พ.ศ.)" />
                            <button type="button" id="calendarButton">📅</button>
                        </div>
                        <input type="date" id="hiddenDateInput" style="display: none; visibility: hidden;">
                    </div>
    
                    <div>
                        <label>เลขหน้า 3 ตัว (1)</label>
                        <input type="text" id="front-three-1" maxlength="3" inputmode="numeric" pattern="\d*" placeholder="หน้าชุด 1">
                    </div>
                    <div>
                        <label>เลขหน้า 3 ตัว (2)</label>
                        <input type="text" id="front-three-2" maxlength="3" inputmode="numeric" pattern="\d*" placeholder="หน้าชุด 2">
                    </div>
    
                    <div>
                        <label>เลขท้าย 3 ตัว (1)</label>
                        <input type="text" id="back-three-1" maxlength="3" inputmode="numeric" pattern="\d*" placeholder="ท้ายชุด 1">
                    </div>
                    <div>
                        <label>เลขท้าย 3 ตัว (2)</label>
                        <input type="text" id="back-three-2" maxlength="3" inputmode="numeric" pattern="\d*" placeholder="ท้ายชุด 2">
                    </div>
    
                    <div class="thai-grid-full">
                        <label for="back-two">เลขท้าย 2 ตัว</label>
                        <input type="text" id="back-two" maxlength="2" inputmode="numeric" pattern="\d*" placeholder="2 ตัวล่าง">
                    </div>
                    <div class="thai-grid-full">
                        <label for="first-prize">รางวัลที่ 1 (6 ตัว)</label>
                        <input type="text" id="first-prize" maxlength="6" inputmode="numeric" pattern="\d*" placeholder="รางวัลที่ 1">
                    </div>
    
                    <div class="thai-grid-full button-container">
                        <button id="displayThaiResultsButton">แสดงผล</button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-content">
            <div id="captureArea" class="popup-main-content">
                <div style="position: relative; z-index: 1;">
                    <div class="result-header">
                        <div id="popupNameDisplay"></div>
                    </div>
                    <p id="popupTimeDisplay"></p>
                    <p id="popupDateDisplay"></p>
                    
                    <div style="margin-top: 15px;">
                        <div id="popupPrizeTitle" class="prize-title"></div>
                    </div>

                    <div id="popupMainDigitsDisplay" class="ball-group"></div>
                    <div class="numbers-display">
                        <div class="number-group">
                            <p class="prize-label-blue">3 ตัวบน</p>
                            <div id="popupThreeDigitsDisplay" class="ball-group"></div>
                        </div>
                        <div class="number-group">
                            <p class="prize-label-orange">2 ตัวล่าง</p>
                            <div id="popupTwoDigitsDisplay" class="ball-group"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="popup-buttons-container">
                <div class="popup-buttons">
                    <button id="popupCircleButton" class="popup-button" onclick="toggleCirclePopup()">สี่เหลี่ยมล่าง</button>
                    <button id="popupSquareButton" class="popup-button" onclick="toggleSquarePopup()">สี่เหลี่ยมสามตัวบน</button>
                    <button id="popupCircleTopButton" class="popup-button" onclick="toggleSquareTopPopup()">สี่เหลี่ยมสองตัวบน</button>
                </div>
                <button id="saveLaoAsImageButton" class="popup-button" style="background-color: #007bff; max-width: 200px; width: 100%;">บันทึกเป็นรูปภาพ</button>
                <div style="display: flex; gap: 5px; max-width: 200px; width: 100%;">
                    <button id="shareLaoImageButton" class="popup-button" style="background-color:#28a745; flex-grow: 1; margin: 0;">
                        📤 ส่งต่อไปแอป
                    </button>
                    <button id="shareSettingsBtnLao" class="popup-button" style="background-color:#1e7e34; width: 50px; margin: 0;" title="ตั้งค่าการแชร์">
                        ⚙️
                    </button>
                </div>
                <button class="close-popup" onclick="closePopup()">ปิดหน้าต่างนี้</button>
            </div>
        </div>
    </div>

    <div id="thaiLotteryPopupOverlay" class="popup-overlay">
        <div id="thaiLotteryPopupContent" class="popup-content">
            <div class="result-display">
                <div style="position: relative; text-align: center; font-size: 18px; line-height: 0.5;">
                    <div class="result-header">
                        <div class="topic-box">
                            <img src="logo.png" alt="Logo" class="header-logo">
                            <span>ผลฉลากกินแบ่งรัฐบาล</span>
                            <img src="logo.png" alt="Logo" class="header-logo">
                        </div>
                    </div>

                    <div class="draw-date"><span id="display-draw-date"></span></div>
                    
                    <div class="result-section" style="margin-top: 10px;">
                        <div class="prize-title">รางวัลที่ 1</div>
                    </div>

                    <div id="first-prize-display" class="number-group" style="margin-top: 5px;"></div>
                    
                    <div class="result-section horizontal-prize-groups">
                        <div class="three-digit-prize-group">
                            <p class="prize-label-blue">เลขหน้า 3 ตัว</p>
                            <div class="horizontal-numbers">
                                <div id="display-front-three-1" class="number-group"></div>
                                <div class="vertical-dash-separator"></div>
                                <div id="display-front-three-2" class="number-group"></div>
                            </div>
                        </div>
                        <div class="three-digit-prize-group">
                            <p class="prize-label-green">เลขท้าย 3 ตัว</p>
                            <div class="horizontal-numbers">
                                <div id="display-back-three-1" class="number-group"></div>
                                <div class="vertical-dash-separator"></div>
                                <div id="display-back-three-2" class="number-group"></div>
                            </div>
                        </div>
                    </div>
                    <div class="result-section prize-group-vertical">
                        <div id="display-back-two" class="number-group"></div>
                        <p class="prize-label-orange">เลขท้าย 2 ตัว</p>
                    </div>
                </div>
            </div>
            <div class="popup-controls">
                <button id="saveThaiAsImageButton" class="popup-button">บันทึกเป็นรูปภาพ</button>
                <div style="display: flex; gap: 5px; width: 100%; justify-content: center;">
                    <button id="shareThaiImageButton" class="popup-button" style="background-color:#28a745; flex-grow: 1; margin: 0;">
                        📤 ส่งต่อ
                    </button>
                    <button id="shareSettingsBtnThai" class="popup-button" style="background-color:#1e7e34; width: 50px; margin: 0;" title="ตั้งค่าการแชร์">
                        ⚙️
                    </button>
                </div>
                <button class="close-popup" onclick="closeThaiPopup()">ปิดหน้าต่างนี้</button>
            </div>
        </div>
    </div>

    <!-- Share Settings Modal -->
    <div id="shareSettingsModal" class="popup-overlay" style="z-index: 2000; display: none;">
        <div class="popup-content" style="max-width: 350px; background-color: #f0f8ff;">
            <h2 style="color: #0056b3; text-align: center;">ตั้งค่าปุ่มแชร์ด่วน</h2>
            <p style="text-align: center; font-size: 14px; margin-bottom: 15px;">เลือกการทำงานเมื่อกดปุ่มสีเขียว</p>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label style="background: white; padding: 10px; border-radius: 8px; border: 1px solid #ccc; display: flex; align-items: center;">
                    <input type="radio" name="shareMode" value="system" style="margin-right: 10px;">
                    <div>
                        <strong>แชร์ปกติ (System Share)</strong><br>
                        <span style="font-size: 12px; color: #666;">เรียกเมนูแชร์ของเครื่อง (เลือกแอปเองทุกครั้ง)</span>
                    </div>
                </label>

                <label style="background: white; padding: 10px; border-radius: 8px; border: 1px solid #ccc; display: flex; align-items: center;">
                    <input type="radio" name="shareMode" value="copy" style="margin-right: 10px;">
                    <div>
                        <strong>คัดลอกรูปภาพ (Copy Image)</strong><br>
                        <span style="font-size: 12px; color: #666;">คัดลอกทันที! เหมาะสำหรับนำไปวางในแชท Line/Face กลุ่มเดิมบ่อยๆ</span>
                    </div>
                </label>
            </div>

            <div class="modal-button-group" style="margin-top: 20px; text-align: center;">
                <button id="saveShareSettingsBtn" class="popup-button" style="background-color: #28a745; width: 100px;">บันทึก</button>
                <button id="closeShareSettingsBtn" class="popup-button" style="background-color: #6c757d; width: 100px;">ปิด</button>
            </div>
        </div>
    </div>

    <button class="back-button" onclick="window.location.href='index.html'">กลับสู่หน้าหลัก</button>
    <footer>&copy; 2025 Juckphai. All Rights Reserved.</footer>
    
</footer>  

    <script src="script5.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw-main.js')
                    .then(registration => {
                        console.log('Service Worker registered successfully for 2.html:', registration);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });

            // อัปเดตหน้าเว็บอัตโนมัติเมื่อ Service Worker มีการเปลี่ยนแปลง
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
</body>
</html>
