<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลรางวัลกลุ่มลาวและรัฐบาล</title>
    
    <link rel="manifest" href="manifest-all-lao.json">
    <meta name="theme-color" content="#FF9800"/>
    <link rel="apple-touch-icon" href="192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ผลรางวัลกลุ่มลาว">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
<h1>ฟอร์มแปลตัวเลข 2, 3 และ 4 ตัว</h1>
<div class="form-container">
    <input type="text" id="numberInput" placeholder="กรอกตัวเลข 2, 3 หรือ 4 หลัก" pattern="\d*" maxlength="4" inputmode="numeric" />

    <!-- Unified Topic Section -->
    <div class="select-wrapper">
        <select id="topicSelect" onchange="checkCustomTopicOption(this)">
            <option value="ลาวประตูชัย เวลา 05.45 น." data-default="true">ลาวประตูชัย เวลา 05.45 น.</option>
            <option value="ลาวสันติภาพ เวลา 06.45 น." data-default="true">ลาวสันติภาพ เวลา 06.45 น.</option>
            <option value="ประชาชนลาว เวลา 07.45 น." data-default="true">ประชาชนลาว เวลา 07.45 น.</option>
            <option value="ลาว Extra เวลา 08.30 น." data-default="true">ลาว Extra เวลา 08.30 น.</option>
            <option value="ลาว TV เวลา 10.30 น." data-default="true">ลาว TV เวลา 10.30 น.</option>
            <option value="ลาว HD เวลา 13.45 น." data-default="true">ลาว HD เวลา 13.45 น.</option>
            <option value="ลาวสตาร์ เวลา 15.45 น." data-default="true">ลาวสตาร์ เวลา 15.45 น.</option>
            <option value="รัฐบาล เวลา 15.45 น." data-default="true">รัฐบาล เวลา 15.45 น.</option>
            <option value="ฮานอยกาชาด เวลา 16.30 น." data-default="true">ฮานอยกาชาด เวลา 16.30 น.</option>
            <option value="อานอยพิเศษ เวลา 17.30 น." data-default="true">อานอยพิเศษ เวลา 17.30 น.</option>
            <option value="ฮานอย เวลา 18.30 น." data-default="true">ฮานอย เวลา 18.30 น.</option>
            <option value="ฮานอย VIP เวลา 19.30 น." data-default="true">ฮานอย VIP เวลา 19.30 น.</option>
            <option value="ลาวสามัคคี เวลา 20.30 น." data-default="true">ลาวสามัคคี เวลา 20.30 น.</option>
            <option value="ลาวพัฒนา เวลา 20.30 น." data-default="true">ลาวพัฒนา เวลา 20.30 น.</option>
            <option value="ลาวอาเซียน เวลา 21.00 น." data-default="true">ลาวอาเซียน เวลา 21.00 น.</option>
            <option value="ลาว VIP เวลา 21.30 น." data-default="true">ลาว VIP เวลา 21.30 น.</option>
            <option value="ลาวสามัคคี VIP เวลา 21.30 น." data-default="true">ลาวสามัคคี VIP เวลา 21.30 น.</option>
            <option value="ลาวสตาร์ VIP เวลา 22.00 น." data-default="true">ลาวสตาร์ VIP เวลา 22.00 น.</option>
            <option value="ลาวกาชาด เวลา 23.30 น." data-default="true">ลาวกาชาด เวลา 23.30 น.</option>
            <option value="custom">อื่นๆ (พิมพ์เอง)</option>
        </select>
        <button class="manage-btn-inline" id="toggleTopicControls" title="จัดการหัวข้อ">⚙️</button>
    </div>
    <div class="management-actions" id="topicActions">
        <button id="addTopicBtn" class="add-btn">เพิ่ม</button>
        <button id="editTopicBtn" class="edit-btn">แก้ไข</button>
        <button id="deleteTopicBtn" class="delete-btn">ลบ</button>
        <button id="resetTopicBtn" class="reset-btn">คืนค่า</button>
    </div>
    <div id="customTopicInputs" style="display: none;">
         <div class="custom-topic-row" style="display: flex; justify-content: center; gap: 10px; width: 80%; margin: 0 auto;">
            <input type="text" id="customTopicName" placeholder="กรุณากรอกหัวข้อเอง" style="width: 60%; margin: 0;" />
            <input type="text" id="customTopicTime" placeholder="เวลา (เช่น 08.30)" style="width: 40%; margin: 0;" />
        </div>
    </div>

    <!-- Unified Person Section -->
    <div class="select-wrapper">
        <select id="personSelect" onchange="checkCustomOption(this)">
           <option value="@" data-default="true">@</option> 
          <option value="Team" data-default="true">Team</option>        
            <option value="Udon Don" data-default="true">Udon Don</option>
            <option value="custom">อื่นๆ (พิมพ์เอง)</option>
        </select>
        <button class="manage-btn-inline" id="togglePersonControls" title="จัดการผู้บอก">⚙️</button>
    </div>
    <div class="management-actions" id="personActions">
        <button id="addPersonBtn" class="add-btn">เพิ่ม</button>
        <button id="editPersonBtn" class="edit-btn">แก้ไข</button>
        <button id="deletePersonBtn" class="delete-btn">ลบ</button>
        <button id="resetPersonBtn" class="reset-btn">คืนค่า</button>
    </div>
    <input type="text" id="customPersonInput" placeholder="กรุณากรอกชื่อผู้บอกเอง" style="display: none; width: 80%; margin: 10px auto;" />

    <div class="date-input-wrapper">
        <input type="text" id="dateInput" placeholder="วว/ดด/ปปปป (พ.ศ.)" />
        <button type="button" id="calendarButton">📅</button>
    </div>
    <input type="date" id="hiddenDateInput" style="display: none; visibility: hidden;">

    <input type="text" id="noteInput" placeholder="หมายเหตุ (ถ้ามี)" />
    <button id="convertButton">แปลตัวเลข</button>
    
    <!-- เพิ่ม Checkbox เปิดโหมดแชร์ด่วน -->
    <label style="display:block; margin-top:10px; font-weight:bold;">
      <input type="checkbox" id="quickShareToggle">
      🚀 เปิดโหมดแชร์ด่วน (กดแปลแล้วแชร์ทันที)
    </label>
</div>

<button id="homeButton" class="homeButton" onclick="window.location.href='index.html'">กลับสู่หน้าหลัก</button>
<!-- Result Popup -->
<div id="resultPopupOverlay" class="popup-overlay">
<div class="popup-content">
<div id="resultContainerDiv" class="result-container-popup">
<div id="resultContentWrapper"></div>
</div>
<div class="controls">
<button id="saveResultAsImageBtn" class="close-popup-btn" style="background-color: #007bff; margin-bottom: 15px;">บันทึกเป็นรูปภาพ</button>
<button id="shareResultBtn"
        class="close-popup-btn"
        style="background-color:#28a745; margin-bottom:15px;">
แชร์ไปยังแอป
</button>
<div class="control-group">
<label for="popupFontSizeSlider">ปรับขนาดตัวอักษร:</label>
<input type="range" id="popupFontSizeSlider" min="0.7" max="2.0" step="0.05" value="1.0">
<span id="popupFontSizeValue">ขนาด: 100%</span>
</div>
<div class="control-group">
<label for="popupLineHeightSlider">ปรับขนาดของบรรทัด:</label>
<input type="range" id="popupLineHeightSlider" min="0.5" max="2.5" step="0.1" value="1.3">
<span id="popupLineHeightValue">ความสูงบรรทัด: 1.3</span>
</div>
<button class="close-popup-btn" onclick="closeResultPopup()">ปิดหน้าต่างนี้</button>
</div>
</div>
</div>
<!-- Management Modals -->
<div id="topicModal" class="popup-overlay">
<div class="popup-content" style="max-width: 400px; background-color: #f0f8ff;">
<h2 id="topicModalTitle" style="color: #0056b3; text-align: center;"></h2>
<input type="hidden" id="topicEditIndex">
<input type="text" id="modalTopicName" placeholder="ชื่อหัวข้อ (เช่น ลาวมิตรภาพ)">
<input type="text" id="modalTopicTime" placeholder="เวลา (เช่น 20.30)">
<div class="modal-button-group">
<button id="saveTopicBtn" style="background-color: #28a745;">บันทึก</button>
<button id="cancelTopicBtn" class="close-popup-btn">ยกเลิก</button>
</div>
</div>
</div>
<div id="personModal" class="popup-overlay">
<div class="popup-content" style="max-width: 400px; background-color: #f0f8ff;">
<h2 id="personModalTitle" style="color: #0056b3; text-align: center;"></h2>
<input type="hidden" id="personEditValue">
<input type="text" id="modalPersonName" placeholder="ชื่อผู้บอก">
<div class="modal-button-group">
<button id="savePersonBtn" style="background-color: #28a745;">บันทึก</button>
<button id="cancelPersonBtn" class="close-popup-btn">ยกเลิก</button>
</div>
</div>
</div>

<!-- เพิ่มกล่องแจ้งเตือนแชร์สำเร็จ -->
<div id="shareSuccessToast" style="
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #28a745;
  color: white;
  padding: 12px 20px;
  border-radius: 30px;
  font-weight: bold;
  display: none;
  z-index: 9999;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
">
  ✅ แชร์สำเร็จแล้ว
</div>

<footer>
<div style="text-align: center; margin-bottom: 20px;">
&copy; 2025 Juckphai. All Rights Reserved.
</div>
</footer>    
    <script src="script1.js"></script>
</body>
</html>
