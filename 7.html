<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ระบบจัดเรียงตัวเลข 4 หลัก - แนวทางลาวและรัฐบาล (Popup Results)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fffde7;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            width: 100%;
            overflow-x: hidden;
        }

        .app-wrapper {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 12px 10px;
            background-color: #fffde7;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            color: blue;
            margin-top: 5px;
            margin-bottom: 12px;
            padding: 0 8px;
            word-break: break-word;
        }

        /* ส่วนกรอกข้อมูล (กรอบสีส้ม) */
        .form-container {
            border: 2px solid orange;
            background-color: #FEFEF0;
            margin: 0 0 20px 0;
            padding: 15px 12px;
            border-radius: 10px;
            width: 100%;
            box-shadow: 0 4px 12px rgba(0, 128, 0, 0.15);
            box-sizing: border-box;
        }

        input, select, button {
            font-size: 16px;
            padding: 12px 10px;
            width: 100%;
            margin: 8px 0;
            border-radius: 10px;
            border: 1.5px solid #ddd;
            display: block;
            text-align: center;
            box-sizing: border-box;
            background-color: white;
        }

        label {
            font-size: 16px;
            color: #2c3e50;
            display: block;
            text-align: left;
            margin-bottom: 4px;
            margin-top: 12px;
            font-weight: bold;
            padding-left: 4px;
        }

        .select-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            width: 100%;
            margin: 8px 0;
        }

        .select-wrapper select {
            flex-grow: 1;
            width: auto;
            margin: 0;
            padding: 12px 8px;
        }

        .manage-btn-inline {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            padding: 0;
            font-size: 24px;
            border-radius: 12px;
            background-color: #6c757d;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 48px;
            margin: 0;
        }

        .manage-btn-inline:hover {
            background-color: #5a6268;
            transform: rotate(45deg);
        }

        .management-actions {
            display: none;
            justify-content: center;
            gap: 10px;
            margin: 8px 0 12px;
            flex-wrap: wrap;
            animation: fadeIn 0.3s;
        }

        .management-actions button {
            width: auto;
            padding: 8px 14px;
            font-size: 14px;
            margin: 0;
            border: none;
            color: white;
            transition: background-color 0.2s ease;
            flex: 1 0 auto;
        }

        .add-btn { background-color: #28a745; }
        .add-btn:hover { background-color: #218838; }
        .edit-btn { background-color: #ffc107; color: #212529 !important; }
        .edit-btn:hover { background-color: #e0a800; }
        .delete-btn { background-color: #dc3545; }
        .delete-btn:hover { background-color: #c82333; }
        .reset-btn { background-color: #17a2b8; }
        .reset-btn:hover { background-color: #138496; }

        .date-input-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 8px 0;
            gap: 10px;
        }
        #permDateInput, #permHiddenDate {
            flex-grow: 1;
            margin: 0;
            width: auto;
        }
        #permCalendarButton {
            flex-shrink: 0;
            width: auto;
            margin: 0;
            padding: 12px 16px;
            font-size: 20px;
            background-color: #f0f0f0;
            border: 1.5px solid #ccc;
            cursor: pointer;
            border-radius: 10px;
        }

        button#permutationConvertBtn {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
            margin: 20px 0 8px;
            font-size: 18px;
            font-weight: bold;
            padding: 14px;
        }
        button#permutationConvertBtn:hover {
            background-color: #45a049;
        }

        .homeButton {
            display: block;
            width: 100%;
            margin: 20px 0 10px;
            padding: 12px 20px;
            background-color: orange;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }
        .homeButton:hover {
            background-color: darkorange;
        }
        footer {
            text-align: center;
            padding: 20px 10px;
            font-size: 13px;
            color: #95a5a6;
            width: 100%;
        }

        /* ========== POPUP MODAL หลัก ========== */
        .result-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            padding: 15px;
            box-sizing: border-box;
        }
        .result-popup-container {
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            background: transparent;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }
        /* กรอบสีเขียวสำหรับผลลัพธ์ - ปรับให้พอดีกับเนื้อหาแบบไดนามิก */
        .green-frame {
            background-color: #ffffcc;
            border: 3px solid #4CAF50;
            border-radius: 10px;
            box-shadow: 0 12px 28px rgba(0, 128, 0, 0.4);
            overflow: visible;
            transition: all 0.2s ease;
        }
        #popupResultContent {
            position: relative;
            text-align: center;
            padding: 20px 16px 24px;
            background-color: #ffffcc;
            border-radius: 10px;
            transform-origin: center top;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        /* ส่วนควบคุมด้านล่างกรอบสีเขียว (อยู่ภายนอกกรอบ แต่ภายใน popup) */
        .popup-controls-panel {
            background: #fff9e8;
            border-radius: 10px;
            margin-top: 12px;
            padding: 16px 14px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
            border: 1px solid #ffd966;
        }
        .control-buttons-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .control-buttons-row button {
            flex: 1;
            min-width: 100px;
            margin: 0;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: bold;
        }
        .sliders-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 18px;
        }
        .slider-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            background: #fff3cf;
            padding: 10px 12px;
            border-radius: 30px;
        }
        .slider-item label {
            margin: 0;
            font-size: 14px;
            width: auto;
            flex-shrink: 0;
        }
        .slider-item input {
            flex: 2;
            min-width: 150px;
            margin: 0;
        }
        .slider-item span {
            font-size: 12px;
            background: #fff0b5;
            padding: 4px 10px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .close-popup-btn-large {
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 20px;
            width: 100%;
            transition: 0.2s;
        }
        .close-popup-btn-large:hover {
            background-color: #d32f2f;
        }
        .result-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
            margin-top: 5px;
            flex-wrap: wrap;
        }
        .header-logo {
            width: 38px;
            height: auto;
        }
        .topic-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #FF75FF;
            border: 1px solid #0070C0;
            color: white;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: -1px -1px 1px rgba(0, 0, 0, 0.5), 1px 1px 1px rgba(255, 255, 255, 0.5);
        }
        .topic-time {
            font-size: 17px;
            color: blue;
            font-weight: bold;
            margin-top: 5px;
            margin-bottom: 8px;
        }
        #popupResultNumbers {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            padding: 0;
            width: 100%;
        }
        #popupResultNumbers span {
            display: inline-block;
            padding: 10px 6px;
            background: linear-gradient(135deg, #f5f9ff, #e8f0fe);
            color: #1e3a8a;
            font-size: 18px;
            font-weight: 700;
            border: 1px solid #9bb6d0;
            border-radius: 5px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        @media only screen and (max-width: 480px) {
            #popupResultNumbers {
                gap: 6px;
            }
            #popupResultNumbers span {
                font-size: 14px;
                padding: 8px 2px;
            }
            .topic-box {
                font-size: 16px;
                padding: 6px 14px;
            }
            .slider-item {
                flex-direction: column;
                align-items: stretch;
            }
            .control-buttons-row button {
                min-width: 70px;
                font-size: 12px;
            }
        }
        .info-row-inline {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: baseline;
            gap: 6px 12px;
            margin: 10px 0;
            padding: 6px 8px;
            background: #fff3cf;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #2c3e50;
        }
        .datetime-inline {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 10px;
            margin: 6px 0 8px;
            font-size: 13px;
            color: #2c6e9e;
            background: #fff8e7;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .comment-box {
            font-size: 16px;
            margin: 15px auto;
            padding: 10px 12px;
            color: #3333cc;
            background-color: #f2f2ff;
            border: 1px solid #ccccff;
            border-radius: 12px;
            width: 100%;
            text-align: center;
        }
        .note {
            color: #FF0000;
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .result-popup-container .green-frame {
            animation: fadeIn 0.2s ease;
        }
        /* Modal จัดการอื่นๆ */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 4000;
            justify-content: center;
            align-items: center;
        }
        .popup-content {
            background: #fef7e0;
            border-radius: 10px;
            padding: 24px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-button-group {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            gap: 12px;
        }
        .modal-button-group button { width: 45%; margin: 0; padding: 12px; }
        button:active { transform: scale(0.98); }
        
        /* ปรับแต่งให้กรอบสีเขียวขยายตาม scale โดยไม่ถูกตัด */
        .green-frame-auto-height {
            transition: height 0.1s ease;
        }
        /* ทำให้เนื้อหาภายในกรอบสามารถขยายได้เต็มที่โดยไม่ถูกจำกัด */
        #popupResultContent * {
            max-width: 100%;
            word-break: break-word;
        }
        
        /* ข้อความแจ้งเตือนคุณภาพสูง */
        .quality-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #ffd700;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <h1>🔄 จัดเรียงตัวเลข 4 หลัก (แนวทางลาวและรัฐบาล)</h1>
    
    <!-- ส่วนกรอกข้อมูล (กรอบสีส้ม) -->
    <div class="form-container">
        <div id="permutationModeContent">
            <div class="permutation-container" style="width:100%; margin:0 auto;">
                <label for="permNumbers">🔢 ตัวเลข 4 หลัก:</label>
                <input type="text" id="permNumbers" maxlength="4" placeholder="เช่น 1234" pattern="\d*" inputmode="numeric">
                
                <!-- ประเภท -->
                <div class="select-wrapper">
                    <select id="permTypeSelect">
                        <option value="ลาวพัฒนา เวลา 20.30 น." data-default="true">ลาวพัฒนา เวลา 20.30 น.</option>
                        <option value="ลาวสตาร์ เวลา 15.45 น." data-default="true">ลาวสตาร์ เวลา 15.45 น.</option>
                        <option value="รัฐบาล เวลา 15.45 น." data-default="true">รัฐบาล เวลา 15.45 น.</option>
                        <option value="ฮานอยกาชาด เวลา 16.30 น." data-default="true">ฮานอยกาชาด เวลา 16.30 น.</option>
                        <option value="อานอยพิเศษ เวลา 17.30 น." data-default="true">อานอยพิเศษ เวลา 17.30 น.</option>
                        <option value="ฮานอย เวลา 18.30 น." data-default="true">ฮานอย เวลา 18.30 น.</option>
                        <option value="ฮานอย VIP เวลา 19.30 น." data-default="true">ฮานอย VIP เวลา 19.30 น.</option>
                        <option value="ลาวสามัคคี เวลา 20.30 น." data-default="true">ลาวสามัคคี เวลา 20.30 น.</option>
                        <option value="custom">อื่นๆ (พิมพ์เอง)</option>
                    </select>
                    <button class="manage-btn-inline" id="togglePermTypeControls" title="จัดการประเภท">⚙️</button>
                </div>
                <div class="management-actions" id="permTypeActions">
                    <button id="addPermTypeBtn" class="add-btn">เพิ่ม</button>
                    <button id="editPermTypeBtn" class="edit-btn">แก้ไข</button>
                    <button id="deletePermTypeBtn" class="delete-btn">ลบ</button>
                    <button id="resetPermTypeBtn" class="reset-btn">คืนค่า</button>
                </div>
                <div id="permCustomTypeInputs" style="display: none;">
                    <div>
                        <input type="text" id="permCustomTypeName" placeholder="ชื่อประเภท (เช่น ลาวVIP)">
                        <input type="text" id="permCustomTypeTime" placeholder="เวลา (เช่น 21.30)">
                    </div>
                </div>

                <!-- ผู้บอก -->
                <div class="select-wrapper">
                    <select id="permProviderSelect">
                        <option value="Team" data-default="true">Team</option>
                        <option value="@" data-default="true">@</option>
                        <option value="Udon Don" data-default="true">Udon Don</option>
                        <option value="นาคน้อยทีม" data-default="true">นาคน้อยทีม</option>
                        <option value="เจ้าที่โรงงาน" data-default="true">เจ้าที่โรงงาน</option>
                        <option value="custom">อื่นๆ (พิมพ์เอง)</option>
                    </select>
                    <button class="manage-btn-inline" id="togglePermProviderControls" title="จัดการผู้บอก">⚙️</button>
                </div>
                <div class="management-actions" id="permProviderActions">
                    <button id="addPermProviderBtn" class="add-btn">เพิ่ม</button>
                    <button id="editPermProviderBtn" class="edit-btn">แก้ไข</button>
                    <button id="deletePermProviderBtn" class="delete-btn">ลบ</button>
                    <button id="resetPermProviderBtn" class="reset-btn">คืนค่า</button>
                </div>
                <input type="text" id="permCustomProviderInput" placeholder="กรอกชื่อผู้บอกเอง" style="display: none;">

                <label for="permComment">📝 หมายเหตุ:</label>
                <input type="text" id="permComment" placeholder="หมายเหตุ (ถ้ามี)">
                
                <label for="permDateInput">📅 วันที่:</label>
                <div class="date-input-wrapper">
                    <input type="text" id="permDateInput" placeholder="วว/ดด/ปปปป" />
                    <button type="button" id="permCalendarButton">📅</button>
                    <input type="date" id="permHiddenDate" style="display:none;">
                </div>
                
                <button id="permutationConvertBtn">✨ จัดเรียงตัวเลข (แสดงผล Popup)</button>
            </div>
        </div>
    </div>

    <button class="homeButton" onclick="window.location.href='index.html'">🏠 กลับสู่หน้าหลัก</button>
    <footer>© 2024-2025 Juckphai. All Rights Reserved.</footer>
</div>

<!-- POPUP สำหรับแสดงผลลัพธ์ (ภายในมีกรอบสีเขียว + แผงควบคุมด้านล่าง) -->
<div id="resultPopup" class="result-popup-overlay">
    <div class="result-popup-container">
        <!-- กรอบสีเขียวส่วนผลลัพธ์ - ปล่อยให้ขยายตามเนื้อหา -->
        <div class="green-frame" id="popupGreenFrame">
            <div id="popupResultContent">
                <div class="result-header">
                    <img src="logo.png" class="header-logo" alt="Logo" onerror="this.style.display='none'">
                    <div class="topic-box" id="popupResultTopicBox"><span id="popupResultTypeDisplay">ประเภท</span></div>
                    <img src="logo.png" class="header-logo" alt="Logo" onerror="this.style.display='none'">
                </div>
                <div id="popupResultTimeHtml" class="topic-time"></div>
                <h2 id="popupResultDate" style="color: blue; font-size: 18px; margin: 8px 0;">วันที่: </h2>
                <div id="popupInputNumbersAndProvider" class="info-row-inline"></div>
                <h3 style="color: #2c3e50; font-size: 18px; margin: 12px 0;">✨ ตัวเลขที่จัดเรียงทั้งหมด ✨</h3>
                <div id="popupResultNumbers"></div>
                <div class="note">⚠️ แนวทางเท่านั้น ⚠️</div>
                <div id="popupCurrentDateTime" class="datetime-inline"></div>
                <div class="comment-box">📌 หมายเหตุ: <span id="popupCommentText" style="color: red;"></span></div>
            </div>
        </div>
        
        <!-- แผงควบคุมทั้งหมด (อยู่นอกกรอบสีเขียว แต่ภายใน popup) -->
        <div class="popup-controls-panel">
            <div class="control-buttons-row">
                <button id="popupSaveAsImageBtn" style="background-color:#007bff; color:white;">📸 บันทึกเป็นรูปภาพ (คมชัดสูง)</button>
                <button id="popupShareResultBtn" style="background-color:#28a745; color:white;">📤 แชร์ไปยังแอป (คมชัดสูง)</button>
                <button id="popupShareSettingsBtn" style="background-color:#1e7e34; color:white;" title="ตั้งค่าการแชร์">⚙️</button>
            </div>
            <div class="sliders-container">
                <div class="slider-item">
                    <label>🔍 ปรับขนาดตัวอักษร (Popup):</label>
                    <input type="range" id="popupFontSizeSlider" min="0.7" max="2.0" step="0.05" value="1.0">
                    <span id="popupFontSizeValue">ขนาด: 100%</span>
                </div>
                <div class="slider-item">
                    <label>📏 ปรับความสูงบรรทัด (Popup):</label>
                    <input type="range" id="popupLineHeightSlider" min="0.5" max="2.5" step="0.1" value="1.3">
                    <span id="popupLineHeightValue">ความสูงบรรทัด: 1.3</span>
                </div>
            </div>
            <button id="closePopupMainBtn" class="close-popup-btn-large">✖ ปิดหน้าต่าง</button>
        </div>
    </div>
</div>

<!-- Modal สำหรับจัดการประเภท/ผู้บอก (คงเดิม) -->
<div id="permTypeModal" class="popup-overlay"><div class="popup-content"><h3 id="permTypeModalTitle"></h3><input type="hidden" id="permTypeEditIndex"><input type="text" id="permModalTypeName" placeholder="ชื่อประเภท" style="width:100%"><input type="text" id="permModalTypeTime" placeholder="เวลา (เช่น 20.30)" style="width:100%; margin-top:10px"><div class="modal-button-group"><button id="savePermTypeBtn" style="background:#28a745;">บันทึก</button><button id="cancelPermTypeBtn" class="close-popup-btn">ยกเลิก</button></div></div></div>
<div id="permProviderModal" class="popup-overlay"><div class="popup-content"><h3 id="permProviderModalTitle"></h3><input type="hidden" id="permProviderEditValue"><input type="text" id="permModalProviderName" placeholder="ชื่อผู้บอก" style="width:100%"><div class="modal-button-group"><button id="savePermProviderBtn" style="background:#28a745;">บันทึก</button><button id="cancelPermProviderBtn" class="close-popup-btn">ยกเลิก</button></div></div></div>
<div id="shareSettingsModal" class="popup-overlay"><div class="popup-content"><h3 style="text-align:center">⚙️ ตั้งค่าปุ่มแชร์ (คุณภาพสูง)</h3><label style="display:flex; margin:8px 0;"><input type="radio" name="shareModePerm" value="system" checked> 📱 แชร์ปกติ (System Share) - คุณภาพสูง</label><label style="display:flex; margin:8px 0;"><input type="radio" name="shareModePerm" value="copy"> 📋 คัดลอกรูปภาพ (วางในแชท) - คุณภาพสูง</label><div class="modal-button-group"><button id="savePermShareSettingsBtn" style="background:#28a745;">บันทึก</button><button id="closePermShareSettingsBtn" class="close-popup-btn">ปิด</button></div></div></div>

<div class="quality-badge">✨ คุณภาพรูปภาพสูงสุด (4K Ready)</div>

<script>
    // ==================== ระบบจัดการประเภท/ผู้บอก ====================
    const PERM_TYPE_STORAGE = 'perm_custom_types';
    const PERM_PROVIDER_STORAGE = 'perm_custom_providers';
    const PERM_HIDDEN_TYPES = 'perm_hidden_default_types';
    const PERM_HIDDEN_PROVIDERS = 'perm_hidden_default_providers';
    const SHARE_PREF_KEY = 'sharePreference_perm_only';

    function getStored(key, def=[]) { return JSON.parse(localStorage.getItem(key)) || def; }
    function setStored(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
    function loadPermSelectOptions(selectId, storageKey, hiddenKey, isType=true) {
        const select = document.getElementById(selectId);
        if(!select) return;
        const stored = getStored(storageKey);
        const hidden = getStored(hiddenKey);
        const optionsToKeep = Array.from(select.options).filter(opt => opt.hasAttribute('data-default') || opt.value === 'custom');
        select.innerHTML = '';
        optionsToKeep.forEach(opt => select.appendChild(opt));
        stored.forEach(item => { const opt = document.createElement('option'); opt.value = item.value; opt.textContent = item.text; select.insertBefore(opt, select.querySelector('option[value="custom"]')); });
        if(hidden.length){ Array.from(select.options).forEach(opt => { if(opt.hasAttribute('data-default') && hidden.includes(opt.value)) opt.hidden = true; }); }
    }
    function savePermCustom(selectId, storageKey, newValue, oldValue=null, isType=true) { let items = getStored(storageKey); if(oldValue) { const idx = items.findIndex(i => i.value === oldValue); if(idx !== -1) items[idx] = { value: newValue, text: newValue }; else items.push({ value: newValue, text: newValue }); } else { if(items.some(i => i.value === newValue)) return false; items.push({ value: newValue, text: newValue }); } setStored(storageKey, items); loadPermSelectOptions(selectId, storageKey, isType ? PERM_HIDDEN_TYPES : PERM_HIDDEN_PROVIDERS, isType); return true; }
    function deletePermItem(selectId, storageKey, hiddenKey, isType) { const select = document.getElementById(selectId); const selected = select.options[select.selectedIndex]; if(!selected || selected.value === 'custom') return alert('ไม่สามารถลบตัวเลือกนี้ได้'); if(selected.hasAttribute('data-default')) { let hidden = getStored(hiddenKey); if(!hidden.includes(selected.value)) hidden.push(selected.value); setStored(hiddenKey, hidden); selected.hidden = true; select.selectedIndex = Array.from(select.options).findIndex(o => !o.hidden); } else { let items = getStored(storageKey); items = items.filter(i => i.value !== selected.value); setStored(storageKey, items); loadPermSelectOptions(selectId, storageKey, hiddenKey, isType); } }
    function resetPermSelect(selectId, storageKey, hiddenKey, isType) { if(confirm('คืนค่ารายการทั้งหมด?')) { localStorage.removeItem(storageKey); localStorage.removeItem(hiddenKey); loadPermSelectOptions(selectId, storageKey, hiddenKey, isType); } }
    function getTypeNameAndTime(fullTypeText) { const timeMatch = fullTypeText.match(/เวลา ([\d.]+) น\./); if (timeMatch) { const namePart = fullTypeText.replace(` เวลา ${timeMatch[1]} น.`, ''); return { typeName: namePart, timeText: `⏰ เวลา ${timeMatch[1]} น.` }; } return { typeName: fullTypeText, timeText: '' }; }
    function getSelectedPermType() { const select = document.getElementById('permTypeSelect'); if(select.value === 'custom') { const name = document.getElementById('permCustomTypeName').value.trim(); const time = document.getElementById('permCustomTypeTime').value.trim(); if(!name) return { fullText: 'ไม่ระบุประเภท', typeName: 'ไม่ระบุประเภท', timeText: '' }; const fullText = time ? `${name} เวลา ${time} น.` : name; return { fullText, typeName: name, timeText: time ? `⏰ เวลา ${time} น.` : '' }; } const fullText = select.options[select.selectedIndex].text; const { typeName, timeText } = getTypeNameAndTime(fullText); return { fullText, typeName, timeText }; }
    function getSelectedPermProvider() { const select = document.getElementById('permProviderSelect'); if(select.value === 'custom') { const custom = document.getElementById('permCustomProviderInput').value.trim(); return custom || '@'; } return select.value; }
    
    function loadPermSharePref() { return localStorage.getItem(SHARE_PREF_KEY) || 'system'; }
    
    // ============ ปรับปรุงคุณภาพรูปภาพสูงสุด ============
    // ฟังก์ชันจับภาพเฉพาะกรอบสีเขียวด้วยคุณภาพสูงสุด
    async function captureGreenFrameOnly() {
        const frame = document.getElementById("popupGreenFrame");
        if(!frame) return null;
        
        // เพิ่ม scale สูงขึ้นเพื่อความคมชัด (5 เท่าสำหรับความละเอียดสูงสุด)
        const canvas = await html2canvas(frame, { 
            scale: 5,                    // เพิ่มเป็น 5 เท่า ให้คมชัดระดับ 4K
            backgroundColor: '#ffffcc',
            useCORS: true,
            logging: false,
            windowWidth: frame.scrollWidth,
            windowHeight: frame.scrollHeight,
            onclone: (clonedDoc, element) => {
                // ปรับแต่งใน cloned document ให้ได้คุณภาพสูงสุด
                const clonedFrame = clonedDoc.getElementById("popupGreenFrame");
                if(clonedFrame) {
                    clonedFrame.style.transform = 'none';
                }
            }
        });
        return canvas;
    }
    
    // ฟังก์ชันบันทึกเป็นรูปภาพคุณภาพสูง
    async function saveAsImageFromPopup() { 
        const canvas = await captureGreenFrameOnly(); 
        if(canvas) { 
            const link = document.createElement('a'); 
            link.download = `perm-result-${Date.now()}.png`; 
            // ใช้ PNG คุณภาพสูงสุด (PNG เป็น lossless อยู่แล้ว)
            link.href = canvas.toDataURL('image/png'); 
            link.click(); 
        } else alert("ไม่มีผลลัพธ์"); 
    }
    
    // ฟังก์ชันคัดลอกรูปภาพไปคลิปบอร์ด
    async function copyImageToClipboard(blob) { 
        try { 
            await navigator.clipboard.write([new ClipboardItem({
                [blob.type]: blob
            })]); 
            alert("✅ คัดลอกรูปภาพคุณภาพสูงสำเร็จ! (วางในแชทได้เลย)");
        } catch(e) { 
            alert("เบราว์เซอร์นี้ไม่รองรับการคัดลอกรูปภาพ"); 
        } 
    }
    
    // ฟังก์ชันแชร์รูปภาพคุณภาพสูง
    async function shareFromPopup() { 
        const canvas = await captureGreenFrameOnly(); 
        if(!canvas) return alert("ไม่มีผลลัพธ์"); 
        
        // สร้าง blob ด้วยคุณภาพสูงสุด
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        const mode = loadPermSharePref(); 
        
        if(mode === 'copy') {
            await copyImageToClipboard(blob);
        } else { 
            if(navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], "perm.png", {type:"image/png"})] })) {
                try {
                    await navigator.share({ 
                        files: [new File([blob], "perm.png", {type:"image/png"})],
                        title: "แนวทางตัวเลข 4 หลัก",
                        text: "ผลการจัดเรียงตัวเลข"
                    });
                } catch(e) {
                    if(e.name !== 'AbortError') {
                        alert("แชร์ไม่สำเร็จ ลองใช้โหมดคัดลอกแทน");
                    }
                }
            } else {
                // Fallback: คัดลอกรูปภาพแทน
                alert("เบราว์เซอร์ไม่รองรับการแชร์ไฟล์ เปลี่ยนเป็นโหมดคัดลอกแทน");
                await copyImageToClipboard(blob);
            }
        } 
    }
    
    // ปรับขนาดตัวอักษรและความสูงบรรทัด ให้กรอบขยายอัตโนมัติตามเนื้อหา
    function applyPopupTextScaling() {
        const contentDiv = document.getElementById("popupResultContent");
        const fsSlider = document.getElementById("popupFontSizeSlider");
        const lhSlider = document.getElementById("popupLineHeightSlider");
        const scaleVal = parseFloat(fsSlider.value);
        const lineHeightVal = parseFloat(lhSlider.value);
        // ใช้ scale transform เพื่อขยายเนื้อหาทั้งหมด แต่กรอบจะขยายตามอัตโนมัติเพราะ overflow:visible
        contentDiv.style.transform = `scale(${scaleVal})`;
        contentDiv.style.transformOrigin = "center top";
        contentDiv.style.lineHeight = lineHeightVal;
        // อัปเดตค่าแสดงผล
        document.getElementById("popupFontSizeValue").innerHTML = `ขนาด: ${Math.round(scaleVal*100)}%`;
        document.getElementById("popupLineHeightValue").innerHTML = `ความสูงบรรทัด: ${lineHeightVal.toFixed(1)}`;
    }
    
    function showResultPopup(numbersInput, provider, typeName, timeText, fullDateStr, comment, nowDateTimeStr, sortedNumbers) {
        const popup = document.getElementById("resultPopup");
        document.getElementById("popupResultTypeDisplay").innerHTML = typeName;
        document.getElementById("popupResultTimeHtml").innerHTML = timeText || '';
        document.getElementById("popupResultDate").innerHTML = `📅 ${fullDateStr}`;
        const infoDiv = document.getElementById("popupInputNumbersAndProvider");
        infoDiv.innerHTML = `<span>🔢 ตัวเลข <strong style="color:#1e3a8a; background:#FFF0C0; padding:2px 10px; border-radius:15px;">${numbersInput}</strong></span> <span>| 👤 ผู้บอก: ${provider}</span>`;
        document.getElementById("popupCommentText").innerHTML = comment;
        document.getElementById("popupCurrentDateTime").innerHTML = `📆 จัดเรียงเมื่อ: ${nowDateTimeStr}`;
        const container = document.getElementById("popupResultNumbers");
        container.innerHTML = "";
        sortedNumbers.forEach(num => { let span = document.createElement("span"); span.textContent = num; container.appendChild(span); });
        popup.style.display = "flex";
        
        // รีเซ็ตการปรับขนาดให้เป็นค่าปัจจุบันจากสไลด์ และปรับให้กรอบขยายได้
        applyPopupTextScaling();
    }
    
    function processAndShowPopup() {
        const numbersInput = document.getElementById("permNumbers").value.trim();
        if(!/^\d{4}$/.test(numbersInput)) { alert("กรุณากรอกตัวเลข 4 หลักให้ถูกต้อง (เฉพาะตัวเลข 4 หลัก)"); return; }
        const provider = getSelectedPermProvider();
        const { typeName, timeText } = getSelectedPermType();
        let comment = document.getElementById("permComment").value.trim() || "ไม่มีหมายเหตุ";
        let dateStr = document.getElementById("permDateInput").value;
        let displayDate = new Date();
        if(dateStr && dateStr.match(/\d{1,2}\/\d{1,2}\/\d{4}/)) {
            let parts = dateStr.split('/');
            let y = parseInt(parts[2]) - 543;
            displayDate = new Date(y, parseInt(parts[1])-1, parseInt(parts[0]));
        }
        const thaiFullDate = displayDate.toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
        const now = new Date();
        const nowThai = now.toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
        const nowTime = now.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
        const nowDateTimeStr = `${nowThai} เวลา ${nowTime} น.`;
        const unique = new Set();
        function permute(str, prefix="") { if(str.length===0) unique.add(prefix); else for(let i=0;i<str.length;i++) permute(str.slice(0,i)+str.slice(i+1), prefix+str[i]); }
        permute(numbersInput);
        const sorted = [...unique].sort((a,b)=>a.localeCompare(b));
        showResultPopup(numbersInput, provider, typeName, timeText, thaiFullDate, comment, nowDateTimeStr, sorted);
    }
    
    function initManagementUI() {
        loadPermSelectOptions('permTypeSelect', PERM_TYPE_STORAGE, PERM_HIDDEN_TYPES, true);
        loadPermSelectOptions('permProviderSelect', PERM_PROVIDER_STORAGE, PERM_HIDDEN_PROVIDERS, false);
        document.getElementById('togglePermTypeControls').onclick = () => { const a=document.getElementById('permTypeActions'); a.style.display = a.style.display==='flex'?'none':'flex'; };
        document.getElementById('togglePermProviderControls').onclick = () => { const a=document.getElementById('permProviderActions'); a.style.display = a.style.display==='flex'?'none':'flex'; };
        document.getElementById('addPermTypeBtn').onclick = () => { document.getElementById('permTypeModalTitle').innerHTML='➕ เพิ่มประเภท'; document.getElementById('permTypeEditIndex').value=''; document.getElementById('permModalTypeName').value=''; document.getElementById('permModalTypeTime').value=''; document.getElementById('permTypeModal').style.display='flex'; };
        document.getElementById('editPermTypeBtn').onclick = () => { let s=document.getElementById('permTypeSelect'); let opt=s.options[s.selectedIndex]; if(opt.value==='custom'||opt.hidden) return alert('ไม่สามารถแก้ไขรายการนี้'); let [name,timePart] = opt.text.split(' เวลา '); document.getElementById('permModalTypeName').value=name||''; document.getElementById('permModalTypeTime').value=timePart?timePart.replace(' น.',''):''; document.getElementById('permTypeEditIndex').value=opt.text; document.getElementById('permTypeModalTitle').innerHTML='✏️ แก้ไขประเภท'; document.getElementById('permTypeModal').style.display='flex'; };
        document.getElementById('deletePermTypeBtn').onclick = () => deletePermItem('permTypeSelect', PERM_TYPE_STORAGE, PERM_HIDDEN_TYPES, true);
        document.getElementById('resetPermTypeBtn').onclick = () => resetPermSelect('permTypeSelect', PERM_TYPE_STORAGE, PERM_HIDDEN_TYPES, true);
        document.getElementById('savePermTypeBtn').onclick = () => { let name=document.getElementById('permModalTypeName').value.trim(); let time=document.getElementById('permModalTypeTime').value.trim(); if(!name) return alert('กรุณากรอกชื่อ'); let newVal = time ? `${name} เวลา ${time} น.` : name; let old=document.getElementById('permTypeEditIndex').value; if(savePermCustom('permTypeSelect', PERM_TYPE_STORAGE, newVal, old||null, true)) document.getElementById('permTypeModal').style.display='none'; else alert('มีรายการนี้อยู่แล้ว'); };
        document.getElementById('cancelPermTypeBtn').onclick = () => document.getElementById('permTypeModal').style.display='none';
        document.getElementById('addPermProviderBtn').onclick = () => { document.getElementById('permProviderModalTitle').innerHTML='➕ เพิ่มผู้บอก'; document.getElementById('permProviderEditValue').value=''; document.getElementById('permModalProviderName').value=''; document.getElementById('permProviderModal').style.display='flex'; };
        document.getElementById('editPermProviderBtn').onclick = () => { let s=document.getElementById('permProviderSelect'); let opt=s.options[s.selectedIndex]; if(opt.value==='custom'||opt.hidden) return alert('ไม่สามารถแก้ไข'); document.getElementById('permModalProviderName').value=opt.value; document.getElementById('permProviderEditValue').value=opt.value; document.getElementById('permProviderModalTitle').innerHTML='✏️ แก้ไขผู้บอก'; document.getElementById('permProviderModal').style.display='flex'; };
        document.getElementById('deletePermProviderBtn').onclick = () => deletePermItem('permProviderSelect', PERM_PROVIDER_STORAGE, PERM_HIDDEN_PROVIDERS, false);
        document.getElementById('resetPermProviderBtn').onclick = () => resetPermSelect('permProviderSelect', PERM_PROVIDER_STORAGE, PERM_HIDDEN_PROVIDERS, false);
        document.getElementById('savePermProviderBtn').onclick = () => { let name=document.getElementById('permModalProviderName').value.trim(); if(!name) return alert('กรุณากรอกชื่อ'); let old=document.getElementById('permProviderEditValue').value; if(savePermCustom('permProviderSelect', PERM_PROVIDER_STORAGE, name, old||null, false)) document.getElementById('permProviderModal').style.display='none'; else alert('มีชื่อนี้แล้ว'); };
        document.getElementById('cancelPermProviderBtn').onclick = () => document.getElementById('permProviderModal').style.display='none';
        const typeSelect = document.getElementById('permTypeSelect');
        typeSelect.addEventListener('change', (e) => { document.getElementById('permCustomTypeInputs').style.display = e.target.value === 'custom' ? 'block' : 'none'; });
        const provSelect = document.getElementById('permProviderSelect');
        provSelect.addEventListener('change', (e) => { document.getElementById('permCustomProviderInput').style.display = e.target.value === 'custom' ? 'block' : 'none'; });
        document.getElementById('permCustomTypeInputs').style.display = 'none';
        document.getElementById('permCustomProviderInput').style.display = 'none';
    }
    function initDatePicker() { const input=document.getElementById('permDateInput'); const btn=document.getElementById('permCalendarButton'); const hidden=document.getElementById('permHiddenDate'); const today=new Date(); input.value=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()+543}`; btn.addEventListener('click',()=>hidden.showPicker()); hidden.addEventListener('change',(e)=>{ if(e.target.value){ let [y,m,d]=e.target.value.split('-'); input.value=`${d}/${m}/${parseInt(y)+543}`; } }); }
    function initPopupControls() {
        const fsSlider = document.getElementById("popupFontSizeSlider");
        const lhSlider = document.getElementById("popupLineHeightSlider");
        fsSlider.addEventListener("input", () => { applyPopupTextScaling(); });
        lhSlider.addEventListener("input", () => { applyPopupTextScaling(); });
        document.getElementById("popupSaveAsImageBtn").addEventListener("click", saveAsImageFromPopup);
        document.getElementById("popupShareResultBtn").addEventListener("click", shareFromPopup);
        document.getElementById("popupShareSettingsBtn").addEventListener("click", () => { document.getElementById("shareSettingsModal").style.display = "flex"; });
        document.getElementById("savePermShareSettingsBtn").addEventListener("click", () => { let val=document.querySelector('input[name="shareModePerm"]:checked').value; localStorage.setItem(SHARE_PREF_KEY, val); document.getElementById("shareSettingsModal").style.display="none"; });
        document.getElementById("closePermShareSettingsBtn").addEventListener("click", () => document.getElementById("shareSettingsModal").style.display="none");
        document.getElementById("closePopupMainBtn").addEventListener("click", () => { document.getElementById("resultPopup").style.display = "none"; });
        document.getElementById("resultPopup").addEventListener("click", (e) => { if(e.target === document.getElementById("resultPopup")) document.getElementById("resultPopup").style.display = "none"; });
    }
    
    window.onload = () => {
        initManagementUI();
        initDatePicker();
        initPopupControls();
        document.getElementById("permutationConvertBtn").addEventListener("click", processAndShowPopup);
    };
</script>
</body>
</html>
